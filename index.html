<!DOCTYPE html>
<html lang="en" data-theme="carbon">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitnessOS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>FitnessOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    html,body{height:100%;overflow:hidden;}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="app">
    <div id="view">
      <div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <div style="font-size:48px">⚡</div>
        <div style="font-size:18px;font-weight:700;color:var(--txt)">Loading FitnessOS...</div>
      </div>
    </div>
    <nav id="nav" style="display:none"></nav>
  </div>
  <div id="toast" style="display:flex;opacity:0">
    <span class="toast-icon"></span>
    <span class="toast-msg"></span>
  </div>
  <div id="rest-sheet"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/workout.js"></script>
  <script src="js/modules/bodymap.js"></script>
  <script src="js/modules/coach.js"></script>
  <script src="js/modules/progress.js"></script>
  <script src="js/modules/nutrition.js"></script>
  <script src="js/modules/recovery.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/profiles.js"></script>

  <script>
    S.init();
    const _savedMode = S.g('user.mode');
    if (_savedMode === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      applyTheme(S.g('user.theme') || 'carbon');
    }
    buildNav();
    initCanvas();
    if (!S.g('onboarded')) { go('intro'); } else { go('dashboard'); }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
