<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050505">
  <title>FitnessOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>
  <div id="app">
    <div id="view"></div>
    <nav id="nav">
      <button class="nb" data-route="dashboard" onclick="go('dashboard')" aria-label="Dashboard" touch-action="manipulation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nb" data-route="workouts" onclick="go('workouts')" aria-label="Workouts" touch-action="manipulation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M3 12a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2M3 12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2"/></svg>
        <span>Workout</span>
      </button>
      <button class="nb" data-route="nutrition" onclick="go('nutrition')" aria-label="Nutrition" touch-action="manipulation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span>Nutrition</span>
      </button>
      <button class="nb" data-route="progress" onclick="go('progress')" aria-label="Progress" touch-action="manipulation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Progress</span>
      </button>
      <button class="nb" data-route="settings" onclick="go('settings')" aria-label="Settings" touch-action="manipulation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>
  <div id="toast" class="toast"></div>
  <div id="rest-overlay" class="rest-overlay" style="display:none"></div>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/workouts.js"></script>
  <script src="js/modules/bodystats.js"></script>
  <script src="js/modules/nutrition.js"></script>
  <script src="js/modules/cardio.js"></script>
  <script src="js/modules/progress.js"></script>
  <script src="js/modules/settings.js"></script>
  <script>
    window.addEventListener('load', async function () {
      try {
        await Storage.init();
        const user = await Storage.getUser();
        if (!user || !user.onboarded) {
          go('welcome');
        } else {
          go('dashboard');
        }
      } catch (e) {
        console.error('Init error:', e);
        go('welcome');
      }
    });
  </script>
</body>
</html>
