<!DOCTYPE html>
<html lang="en" data-theme="carbon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitnessOS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="FitnessOS — Your Intelligent Training Operating System">
  <title>FitnessOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    html,body{height:100%;overflow:hidden;}
    #app{position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    #view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe) + 16px);}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="app">
    <div id="view">
      <div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <div style="font-size:48px">⚡</div>
        <div style="font-size:18px;font-weight:700;color:var(--txt)">Loading FitnessOS...</div>
      </div>
    </div>
    <nav id="nav" style="display:none"></nav>
  </div>
  <div id="toast" style="display:none;opacity:0">
    <span class="toast-icon"></span>
    <span class="toast-msg"></span>
  </div>
  <div id="rest-sheet"></div>

  <script>
    // Re-show toast on demand
    document.getElementById('toast').style.display = 'flex';
  </script>

  <!-- Core -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>

  <!-- Modules -->
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/workout.js"></script>
  <script src="js/modules/bodymap.js"></script>
  <script src="js/modules/coach.js"></script>
  <script src="js/modules/progress.js"></script>
  <script src="js/modules/nutrition.js"></script>
  <script src="js/modules/recovery.js"></script>
  <script src="js/modules/settings.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
<script>
  S.init();
  applyTheme(S.g('user.theme') || 'carbon');
  buildNav();
  initCanvas();
  if (!S.g('onboarded')) { go('onboarding'); } else { go('dashboard'); }
</script>
