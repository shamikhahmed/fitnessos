<!DOCTYPE html>
<html lang="en" data-theme="carbon">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitnessOS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>FitnessOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    html,body{height:100%;overflow:hidden;}
    @media (max-width: 374px) {
      :root { --fs-body: 13px; --fs-hero: 28px; --fs-title: 18px; --card-pad: 12px; --nav-h: 60px; }
    }
    @media (min-width: 375px) and (max-width: 413px) {
      :root { --fs-body: 14px; --fs-hero: 32px; --fs-title: 20px; --card-pad: 14px; --nav-h: 64px; }
    }
    @media (min-width: 414px) {
      :root { --fs-body: 15px; --fs-hero: 36px; --fs-title: 22px; --card-pad: 16px; --nav-h: 68px; }
    }
    /* Focus Mode */
    .focus-mode .wkt-non-focus { display: none !important; }
    .focus-mode .wkt-focus-only { display: flex !important; }
    .focus-mode .ex-card { border-color: rgba(var(--c1-rgb), 0.25); }
    .focus-mode .set-inp { font-size: 18px !important; min-height: 42px !important; }
    .focus-mode .ex-card-header { padding-bottom: 4px; }

    /* ── Premium Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes celebrationBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.2); }
      60%  { transform: scale(0.95); }
      80%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .anim-fade-up  { animation: fadeUp  0.32s cubic-bezier(.22,1,.36,1) both; }
    .anim-fade-in  { animation: fadeIn  0.24s ease both; }
    .anim-scale-in { animation: scaleIn 0.28s cubic-bezier(.22,1,.36,1) both; }
    .anim-slide-r  { animation: slideInRight 0.28s cubic-bezier(.22,1,.36,1) both; }
    .anim-pulse    { animation: pulse 2s ease-in-out infinite; }
    .stagger > * { animation: fadeUp 0.32s cubic-bezier(.22,1,.36,1) both; animation-delay: calc(var(--i, 0) * 60ms); }
    .skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, rgba(255,255,255,0.06) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
    }
    .press { transition: transform 0.12s ease, opacity 0.12s ease; }
    .press:active { transform: scale(0.94); opacity: 0.8; }
    .card-press { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card-press:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    #celebration-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      background: rgba(0,0,0,0.5);
    }
    #celebration-overlay .cel-icon {
      font-size: 80px;
      animation: celebrationBounce 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    #celebration-overlay .cel-title {
      font-size: 28px; font-weight: 900; color: #fff;
      margin-top: 16px;
      animation: fadeUp 0.4s 0.2s cubic-bezier(.22,1,.36,1) both;
    }
    #celebration-overlay .cel-sub {
      font-size: 14px; color: rgba(255,255,255,0.7);
      margin-top: 8px;
      animation: fadeUp 0.4s 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="offline-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff453a;color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:600">
  📵 You're offline — FitnessOS works fully offline
</div>
<script>
window.addEventListener('online', function(){ document.getElementById('offline-banner').style.display='none'; });
window.addEventListener('offline', function(){ document.getElementById('offline-banner').style.display='block'; });
</script>
  <canvas id="bg-canvas"></canvas>
  <div id="app">
    <div id="view">
      <div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <div style="font-size:48px">⚡</div>
        <div style="font-size:18px;font-weight:700;color:var(--txt)">Loading FitnessOS...</div>
      </div>
    </div>
    <nav id="nav" style="display:none"></nav>
  </div>
  <div id="toast" style="display:flex;opacity:0">
    <span class="toast-icon"></span>
    <span class="toast-msg"></span>
  </div>
  <div id="rest-sheet"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/workout.js"></script>
  <script src="js/modules/bodymap.js"></script>
  <script src="js/modules/coach.js"></script>
  <script src="js/modules/progress.js"></script>
  <script src="js/modules/nutrition.js"></script>
  <script src="js/modules/recovery.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/profiles.js"></script>
  <script src="js/modules/anatomy.js"></script>
  <script src="js/modules/rehab.js"></script>
  <script src="js/modules/calisthenics.js"></script>
  <script src="js/modules/knowledge-graph.js"></script>
  <script src="js/modules/recovery-debt.js"></script>
  <script src="js/modules/physique.js"></script>
  <script src="js/modules/injury-risk.js"></script>
  <script src="js/modules/training-intelligence.js"></script>
  <script src="js/modules/advanced-search.js"></script>
  <script src="js/modules/visualizations.js"></script>
  <script src="js/modules/encyclopedia.js"></script>
  <script src="js/modules/body-intelligence.js"></script>
  <script src="js/modules/physique-archetype.js"></script>
  <script src="js/modules/training-style.js"></script>
  <script src="js/modules/fitness-assistant.js"></script>
  <script src="js/modules/quests.js"></script>
  <script src="js/modules/hub.js"></script>

  <script>
    S.init();
    const _savedMode = S.g('user.mode');
    if (_savedMode === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      applyTheme(S.g('user.theme') || 'carbon');
    }
    buildNav();
    if (typeof loadCustomExercises === 'function') loadCustomExercises();
    initCanvas();
    if (!S.g('onboarded')) {
      go('intro');
    } else {
      const lastBriefing = S.g('settings.lastBriefingDate');
      const todayStr = new Date().toISOString().slice(0,10);
      if (lastBriefing !== todayStr && S.g('settings.dailyBriefing') !== false) {
        S.set('settings.lastBriefingDate', todayStr);
        go('briefing');
      } else {
        go('dashboard');
      }
    }
    var _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredInstallPrompt = e;
      var visits = parseInt(localStorage.getItem('fos_visits')||'0') + 1;
      localStorage.setItem('fos_visits', visits);
      if (visits >= 3 && !localStorage.getItem('fos_installed')) {
        setTimeout(function() {
          var banner = document.createElement('div');
          banner.id = 'install-banner';
          banner.style.cssText = 'position:fixed;bottom:calc(80px + var(--safe,0px));left:16px;right:16px;background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:888;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:entryIn 0.3s ease';
          banner.innerHTML = '<div style="font-size:28px">📱</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--txt)">Add to Home Screen</div><div style="font-size:11px;color:var(--txt3)">Install FitnessOS for the best experience</div></div><button onclick="_installPWA()" style="background:var(--grad);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation">Install</button><button onclick="document.getElementById(\'install-banner\').remove();localStorage.setItem(\'fos_installed\',\'dismissed\')" style="background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;padding:4px;touch-action:manipulation">×</button>';
          document.body.appendChild(banner);
        }, 2000);
      }
    });
    window.addEventListener('appinstalled', function() {
      localStorage.setItem('fos_installed', 'true');
      var b = document.getElementById('install-banner');
      if (b) b.remove();
    });
    window._installPWA = function() {
      if (!_deferredInstallPrompt) return;
      _deferredInstallPrompt.prompt();
      _deferredInstallPrompt.userChoice.then(function(r) {
        if (r.outcome === 'accepted') { localStorage.setItem('fos_installed','true'); toast('FitnessOS installed! 🎉','ok'); }
        _deferredInstallPrompt = null;
        var b = document.getElementById('install-banner'); if (b) b.remove();
      });
    };
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
